name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python 3.11
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: .venv/bin/python
          - os: macos-latest
            python: .venv/bin/python
          - os: windows-latest
            python: .venv/Scripts/python.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install package and test dependencies
        run: |
          ${{ matrix.python }} -m pip install --upgrade pip
          ${{ matrix.python }} -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ${{ matrix.python }} -m ruff check

      - name: Ruff format check
        run: ${{ matrix.python }} -m ruff format --check

      - name: Markdown format check
        run: ${{ matrix.python }} -m mdformat --check .

      - name: Pyright
        run: ${{ matrix.python }} -m pyright

      - name: Pytest
        run: ${{ matrix.python }} -m pytest -q
